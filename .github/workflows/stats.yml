name: Show Archive Stats

on:
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run stats
        run: python stats.py
